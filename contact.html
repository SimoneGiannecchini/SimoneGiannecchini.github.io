    <link rel="stylesheet" href="assets/scss/style.css?v=20260426">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo"><img src="assets/img/logo2.png" alt="Logo Giannecchini Simone" class="logo-image"></a>
        <input class="menu-btn" id="menu-btn" type="checkbox">
        <label for="menu-btn" class="menu-icon" aria-label="Apri il menu di navigazione">
            <span class="nav-icon"></span>
        </label>
        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="porfolio.html">Portfolio</a></li>
            <li><a href="contact.html">Contatti</a></li>
        </ul>
    </header>

    <section id="modulo">
        <div class="content">
            <h1>Contattami</h1>
            <h3>Parliamo del tuo progetto</h3>
            <p class="contact-intro">Compila il modulo e raccontami in breve come posso aiutarti. Ti rispondo appena possibile.</p>
            <form id="contactForm" class="contact-form" method="post">
                <ul class="contact-form-grid">
                    <li class="primo contact-field">
                        <label for="nome">Nome</label>
                        <input type="text" name="nome" id="nome" class="testo" placeholder="Il tuo nome" required>
                    </li>
                    <li class="secondo contact-field">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" class="testo" placeholder="nome@email.it" required>
                    </li>
                    <li class="subject contact-field">
                        <label for="oggetto">Oggetto</label>
                        <input type="text" name="oggetto" id="oggetto" class="testo" placeholder="Di cosa vuoi parlarmi?" required>
                    </li>
                    <li class="terzo contact-field">
                        <label for="messaggio">Messaggio</label>
                        <textarea name="messaggio" id="messaggio" class="testo" rows="6" placeholder="Scrivi qui il tuo messaggio..." required></textarea>
                    </li>
                    <li class="quarto contact-actions">
                        <button type="submit" id="contactSubmit">Invia</button>
                    </li>
                </ul>
            </form>
            <p id="formStatus" class="form-status" aria-live="polite"></p>
        </div>
    </section>

    <footer>
        <ul>
            <li class="link">
                <a href="https://www.linkedin.com/in/giannecchinisimone/" target="_blank" rel="noopener noreferrer">Profilo LinkedIn</a>

            </li>
        </ul>
        <p class="diritti">&copy; 2024 - 2026 Giannecchini Simone. Tutti i diritti riservati.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="assets/JS/javascript.js" defer></script>
</body>
</html>
